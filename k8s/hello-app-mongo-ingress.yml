apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-ingress
  namespace: prod-space
spec:
  ingressClassName: nginx
  rules:
    - host: "ec2-3-111-223-27.ap-south-1.compute.amazonaws.com"
      http:
        paths:
          - path: /mongo
            pathType: Prefix
            backend:
              service:
                name: mongo-express-service
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-app
                port:
                  number: 8000
