apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hello-app
  namespace: prod-space
  labels:
    grafana_dashboard: "1"
data:
  hello-app.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisLabel": "req/s",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "reqps"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "2.." },
                "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "3.." },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "5.." },
                "properties": [{ "id": "color", "value": { "fixedColor": "super-light-red", "mode": "fixed" } }]
              }
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(starlette_requests_total{namespace=\"prod-space\"}[5m])) by (status_code)",
              "legendFormat": "{{status_code}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(starlette_requests_total{namespace=\"prod-space\",status_code=~\"4..|5..\"}[5m])) / sum(rate(starlette_requests_total{namespace=\"prod-space\"}[5m]))",
              "legendFormat": "Error %",
              "refId": "A"
            }
          ]
        },
        {
          "title": "In-Progress Requests",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 25 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(starlette_requests_in_progress{namespace=\"prod-space\"})",
              "legendFormat": "In Progress",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Response Time (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "seconds",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "scheme",
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(starlette_request_duration_seconds_bucket{namespace=\"prod-space\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(starlette_request_duration_seconds_bucket{namespace=\"prod-space\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(starlette_request_duration_seconds_bucket{namespace=\"prod-space\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "title": "Response Time by Endpoint",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisLabel": "seconds",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "scheme",
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(starlette_request_duration_seconds_bucket{namespace=\"prod-space\"}[5m])) by (le, path))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Request Duration Heatmap",
          "type": "heatmap",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "options": {
            "calculate": false,
            "cellGap": 1,
            "color": { "mode": "scheme", "scheme": "Oranges" },
            "exemplars": { "color": "rgba(255,0,255,0.7)" },
            "filterValues": { "le": 1e-9 },
            "yAxis": { "unit": "s" }
          },
          "targets": [
            {
              "expr": "sum(increase(starlette_request_duration_seconds_bucket{namespace=\"prod-space\"}[5m])) by (le)",
              "legendFormat": "{{le}}",
              "refId": "A",
              "format": "heatmap"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["hello-app", "starlette"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Hello App",
      "uid": "hello-app",
      "version": 2
    }
