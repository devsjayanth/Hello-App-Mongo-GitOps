apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hello-app
  namespace: prod-space
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-app
  namespaceSelector:
    matchNames:
      - prod-space
  endpoints:
    - port: "http"
      path: /metrics
      interval: 15s
